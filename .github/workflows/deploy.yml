name: Build and publish to /docs

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build WASM
        run: gradle wasmJsBrowserDistribution
      - name: Publish to docs
        run: |
          rm -rf docs
          mkdir -p docs
          cp -R composeApp/build/dist/wasmJs/productionExecutable/* docs
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "Update docs [skip ci]" || echo "No changes to commit"
          git push
